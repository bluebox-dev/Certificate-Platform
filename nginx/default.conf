map $http_x_forwarded_proto $pass_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Support /certificate/ subpath
    location /certificate {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /certificate/index.html;
    }

    # Redirect root / to /certificate/ so direct IP access redirects
    location = / {
        return 301 /certificate/;
    }

    # Fallback to serve files under /usr/share/nginx/html/certificate
    location / {
        root /usr/share/nginx/html/certificate;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy (under /api)
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_scheme;
    }

    # Backend API Proxy (under /certificate/api)
    location /certificate/api {
        rewrite ^/certificate/(.*)$ /$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_scheme;
    }

    # MinIO Storage Proxy
    location /certificates {
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_scheme;
    }

    # MinIO Storage Proxy (under /certificate/certificates)
    location /certificate/certificates {
        rewrite ^/certificate/(.*)$ /$1 break;
        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $pass_scheme;
    }
}
