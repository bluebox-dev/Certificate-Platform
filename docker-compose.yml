version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ecert_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecert}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: ecert_redis
    environment:
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: ecert_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: always

  api:
    build:
      context: ./apps/api
    container_name: ecert_api
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:secret@postgres:5432/ecert}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      EXTERNAL_STORAGE_ENDPOINT: ${EXTERNAL_STORAGE_ENDPOINT:-http://localhost/certificates}
      DOMAIN: ${DOMAIN:-localhost}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      BUCKET_NAME: ${BUCKET_NAME:-certificates}
      SECRET_KEY: ${SECRET_KEY:-supersecretkeyforecertificatesystem12345!}
      TZ: ${TZ:-Asia/Bangkok}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    restart: always

  pdf-worker:
    build:
      context: ./workers/pdf-worker
    container_name: ecert_pdf_worker
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:secret@postgres:5432/ecert}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      EXTERNAL_STORAGE_ENDPOINT: ${EXTERNAL_STORAGE_ENDPOINT:-http://localhost/certificates}
      DOMAIN: ${DOMAIN:-localhost}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      BUCKET_NAME: ${BUCKET_NAME:-certificates}
      TZ: ${TZ:-Asia/Bangkok}
    restart: always

  web:
    build:
      context: ./apps/web
    container_name: ecert_web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
    environment:
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

volumes:
  postgres_data:
  minio_data:
  redis_data:
